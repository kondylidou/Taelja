name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: 'latest'

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ~/.cabal
          key: ${{ runner.os }}-cabal-${{ hashFiles('taelja.cabal', 'cabal.project') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test --test-show-details=always
